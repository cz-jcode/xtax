name: Publish xtax

on:
  push:
    tags: ["xtax-v*"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  dry-run:
    name: Dry-run publish check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-publish-xtax-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-publish-xtax-

      - name: Publish dry-run (xtax)
        run: cargo publish -p xtax --dry-run

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: dry-run
    environment: release
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-publish-xtax-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-publish-xtax-

      - name: Publish xtax
        run: cargo publish -p xtax --token ${{ secrets.CARGO_REGISTRY_TOKEN }}