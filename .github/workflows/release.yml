name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.2)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  publish:
    name: Publish all crates
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Resolve release version
        id: release
        run: |
          set -euo pipefail
          
          if [ -n "${{ inputs.version }}" ]; then
            # workflow_dispatch — use provided version directly
            VERSION="${{ inputs.version }}"
          else
            # tag trigger — strip 'v' prefix
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            
            if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
              echo "Invalid release tag: $TAG"
              exit 1
            fi
          fi
          
          echo "Release version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate lockstep crate versions
        run: |
          set -euo pipefail
          
          RELEASE_VERSION="${{ steps.release.outputs.version }}"
          CRATES="xtax-encryption xtax-blob-storage xtax"
          
          for CRATE in $CRATES; do
            CRATE_VERSION="$(
              cargo metadata --format-version 1 --no-deps |
              jq -r --arg name "$CRATE" '.packages[] | select(.name == $name) | .version'
            )"
          
            if [ -z "$CRATE_VERSION" ]; then
              echo "Crate $CRATE not found in workspace"
              exit 1
            fi
          
            if [ "$CRATE_VERSION" != "$RELEASE_VERSION" ]; then
              echo "::error::Version mismatch for $CRATE: Cargo.toml has $CRATE_VERSION, tag requires $RELEASE_VERSION"
              exit 1
            fi
          
            echo "$CRATE version OK: $CRATE_VERSION"
          done

      - name: Publish crates
        id: publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          
          VERSION="${{ steps.release.outputs.version }}"
          PUBLISHED_ANY=false
          
          publish_crate() {
            local crate="$1"
            local output
          
            echo "Publishing $crate $VERSION..."
          
            # Let cargo publish decide — it uses the same local index as validation.
            # If the version already exists in the index, cargo exits non-zero and
            # prints "already exists" to stderr.
            set +e
            output="$(cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN" 2>&1)"
            local exit_code=$?
            set -e
          
            if [ $exit_code -ne 0 ]; then
              if echo "$output" | grep -q "already exists"; then
                echo "$crate $VERSION already published — skipping"
                return 0
              fi
          
              echo "$output"
              echo "cargo publish failed for $crate"
              exit $exit_code
            fi
          
            echo "$output"
            echo "$crate $VERSION published successfully"
            PUBLISHED_ANY=true
          }
          
          publish_crate xtax-encryption
          publish_crate xtax-blob-storage
          publish_crate xtax
          
          echo "published_any=$PUBLISHED_ANY" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.publish.outputs.published_any == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          
          echo "Creating GitHub Release $TAG..."
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Release $TAG" \
            --generate-notes